<section class="learning-report" data-learning-report>
  <div class="learning-report__head">
    <div>
      <p class="eyebrow">Отчет</p>
      <h2>Прогресс обучения</h2>
    </div>
    <button class="button button--ghost" type="button" data-learning-report-refresh>Обновить</button>
  </div>

  <div class="learning-report__stats" data-learning-report-stats>
    <span>Уроки: 0</span>
    <span>Завершено: 0</span>
    <span>Средний результат: 0%</span>
  </div>

  <div class="learning-report__list" data-learning-report-list aria-live="polite"></div>
</section>
