<aside class="lesson-notes" data-lesson-notes data-lesson-id="{{ lesson_id }}">
  <div class="lesson-notes__head">
    <p class="eyebrow">Мои заметки</p>
    <button class="button button--ghost" type="button" data-lesson-notes-clear>Очистить</button>
  </div>

  <label>
    Цель после урока
    <input type="text" data-lesson-goal placeholder="Например, рассчитать подушку на 6 месяцев">
  </label>

  <label>
    Короткая заметка
    <textarea data-lesson-note rows="5" placeholder="Запишите важную мысль из урока"></textarea>
  </label>

  <label class="lesson-notes__check">
    <input type="checkbox" data-lesson-understood>
    <span>Тема понятна, можно переходить дальше</span>
  </label>

  <p class="lesson-notes__status" data-lesson-notes-status>Заметки сохраняются в этом браузере.</p>
</aside>
