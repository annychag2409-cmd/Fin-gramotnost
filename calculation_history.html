
<section class="calculation-history" data-calculation-history>
  <div class="calculation-history__head">
    <div>
      <p class="eyebrow">История расчетов</p>
      <h2>Последние расчеты дохода</h2>
    </div>
    <button class="button button--ghost" type="button" data-history-clear>Очистить</button>
  </div>

  <div class="calculation-history__list" data-history-list aria-live="polite">
    <p class="calculation-history__empty">Расчетов пока нет.</p>
  </div>
</section>
